<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>投資情報雷達</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <span class="brand-icon">📈</span>
      <div>
        <h1 class="brand-title">投資情報雷達</h1>
        <span class="brand-sub" id="last-update">載入中...</span>
      </div>
    </div>
    <div class="header-nav">
      <button class="nav-btn" id="prev-date" title="上一天">&#8249;</button>
      <input type="date" id="date-picker" class="date-input">
      <button class="nav-btn" id="next-date" title="下一天">&#8250;</button>
      <button class="nav-btn nav-today" id="goto-today">今日</button>
    </div>
  </div>
</header>

<!-- 狀態列 -->
<div class="status-bar">
  <div class="status-bar-inner">
    <span class="status-item">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">載入中...</span>
    </span>
    <span class="status-item">📅 <strong id="status-date">—</strong></span>
    <span class="status-item">🤖 AI分析：<strong id="status-analyzed">—</strong></span>
    <span class="status-item">📡 資料收集：<strong id="status-collected">—</strong></span>
    <span class="status-item">📰 今日新聞：<strong id="status-news-count">—</strong> 則</span>
  </div>
</div>

<main class="main">

  <!-- 今日特別關注 -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">🔥 今日特別關注</h2>
      <span class="section-sub" id="attention-subtitle">AI 每日自動判斷，評分 4~5 顯示</span>
    </div>
    <div id="attention-container" class="attention-grid"></div>
  </section>

  <!-- 個股情報（分頁式） -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">📊 個股情報</h2>
      <div class="watchlist-manage">
        <input type="text" id="add-stock-input" class="stock-input" placeholder="輸入代號（如 2330）">
        <button id="add-stock-btn" class="add-btn">＋</button>
      </div>
    </div>

    <div class="stock-tab-bar" id="stock-tab-bar"></div>

    <div class="stock-detail-wrap" id="stock-detail-wrap">
      <div class="sub-tab-bar" id="sub-tab-bar">
        <button class="sub-tab active" data-panel="analysis">📌 AI分析</button>
        <button class="sub-tab" data-panel="supply">🔗 供應鏈</button>
        <button class="sub-tab" data-panel="chips">🏦 籌碼</button>
        <button class="sub-tab" data-panel="news">📰 新聞</button>
      </div>
      <div id="panel-analysis" class="panel-body active"></div>
      <div id="panel-supply"   class="panel-body"></div>
      <div id="panel-chips"    class="panel-body"></div>
      <div id="panel-news"     class="panel-body"></div>
    </div>
  </section>

  <!-- 新聞聚合（跨股） -->
  <section class="section">
    <div class="section-header">
      <h2 class="section-title">📰 新聞聚合</h2>
    </div>
    <div class="news-filters" id="news-filters">
      <button class="filter-btn active" data-filter="all">全部</button>
    </div>
    <div id="news-container" class="news-list"></div>
  </section>

</main>

<div id="no-data" class="no-data hidden">
  <div class="no-data-icon">📭</div>
  <h3>這天還沒有資料</h3>
  <p>每天 06:00 自動更新</p>
</div>

<script src="app.js"></script>
</body>
</html>

name: 每日資料蒐集與AI分析

on:
  schedule:
    # ── 台股時段 ──────────────────────────────
    # 台灣時間 07:00 台股開盤前（UTC 前日 23:00）
    - cron: '0 23 * * *'
    # 台灣時間 11:00 台股盤中（UTC 03:00）
    - cron: '0 3 * * *'
    # 台灣時間 15:00 台股收盤（UTC 07:00）
    - cron: '0 7 * * *'
    # ── 美股時段 (EDT, UTC-4) ─────────────────
    # 台灣時間 21:00 美股盤前 ~9AM ET（UTC 13:00）
    - cron: '0 13 * * *'
    # 台灣時間 01:00 美股盤中 ~1PM ET（UTC 17:00）
    - cron: '0 17 * * *'
    # 台灣時間 05:00 美股收盤後 ~5PM ET（UTC 前日 21:00）
    - cron: '0 21 * * *'
  workflow_dispatch:  # 手動觸發

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 收集新聞資料
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/collect_data.py

      - name: AI 分析（今日特別關注）
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/analyze.py

      - name: Commit & Push
        run: |
          git config user.name  "investment-radar-bot"
          git config user.email "bot@investment-radar"
          git add data/reports/
          git diff --staged --quiet || git commit -m "📊 每日更新 $(date '+%Y-%m-%d') — 含AI分析"
          git push

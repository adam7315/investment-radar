name: 每日資料蒐集與AI分析

on:
  schedule:
    # 每天台灣時間 06:00（UTC 22:00 前一天）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動觸發

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: 收集新聞資料
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/collect_data.py

      - name: AI 分析（今日特別關注）
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/analyze.py

      - name: Commit & Push
        run: |
          git config user.name  "investment-radar-bot"
          git config user.email "bot@investment-radar"
          git add data/reports/
          git diff --staged --quiet || git commit -m "📊 每日更新 $(date '+%Y-%m-%d') — 含AI分析"
          git push

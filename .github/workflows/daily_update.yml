name: 每日資料蒐集

on:
  schedule:
    # 每天台灣時間 06:00（UTC 22:00 前一天）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動觸發

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run data collection
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python scripts/collect_data.py

      - name: Commit & Push
        run: |
          git config user.name  "investment-radar-bot"
          git config user.email "bot@investment-radar"
          git add data/reports/
          git diff --staged --quiet || git commit -m "📊 每日資料更新 $(date '+%Y-%m-%d')"
          git push
